name: MLOps Cycle

on:
  push:
    branches: [ "dev", "main", "feature/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-evaluate:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      SECRET_KEY: ${{ secrets.SECRET_KEY || 'ci-secret-key-not-for-prod' }}
      FLASK_ENV: testing
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        working-directory: ./TICKETIA_PRO
        run: |
          python -m pytest tests/ -v --tb=short \
            --ignore=tests/test_deepeval_rag.py \
            --continue-on-collection-errors

      - name: Run AI agent evaluations
        working-directory: ./TICKETIA_PRO
        run: python mlops/eval_agents.py

      - name: Run RAG quality evaluations
        if: env.OPENAI_API_KEY != ''
        working-directory: ./TICKETIA_PRO
        run: python mlops/eval_rag.py
