{% extends "base.html" %}
{% block content %}
<div class="px-6 py-8 max-w-lg mx-auto w-full pb-24">
    <div class="mb-6">
        <a href="{{ url_for('web.dashboard') }}" class="text-sm text-slate-400 hover:text-indigo-600">← Volver</a>
        <h1 class="text-3xl font-bold text-slate-800 mt-2">🎛️ Demo Control</h1>
        <p class="text-slate-500">Panel de Emergencia para Presentaciones.</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 mb-6">
        <h3 class="font-bold text-lg mb-2">1. Inyectar Historia</h3>
        <p class="text-sm text-slate-500 mb-4">Crea 20 tickets falsos el mes pasado para que las gráficas funcionen.</p>
        <form action="{{ url_for('web.demo_seed') }}" method="POST">
            <button
                class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-900 transition-colors">🧪
                Generar Datos</button>
        </form>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
        <h3 class="font-bold text-lg mb-2">2. Forzar Agentes</h3>
        <p class="text-sm text-slate-500 mb-4">Ejecuta la lógica proactiva AHORA (ignora horarios).</p>
        <div class="space-y-3">
            <form action="{{ url_for('web.demo_trigger', agent_name='coach') }}" method="POST">
                <button
                    class="w-full bg-indigo-50 text-indigo-700 py-3 rounded-xl font-bold hover:bg-indigo-100 border border-indigo-100">📊
                    Disparar Coach (Gráfico)</button>
            </form>
            <form action="{{ url_for('web.demo_trigger', agent_name='hunter') }}" method="POST">
                <button
                    class="w-full bg-emerald-50 text-emerald-700 py-3 rounded-xl font-bold hover:bg-emerald-100 border border-emerald-100">💰
                    Disparar Hunter</button>
            </form>
            <form action="{{ url_for('web.demo_trigger', agent_name='networker') }}" method="POST">
                <button
                    class="w-full bg-purple-50 text-purple-700 py-3 rounded-xl font-bold hover:bg-purple-100 border border-purple-100">🤝
                    Disparar Networker</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
