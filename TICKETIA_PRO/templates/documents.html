{% extends "base.html" %}

{% block content %}
<div class="px-6 py-8 pb-24 max-w-4xl mx-auto w-full" x-data="{ tab: 'proposals' }">

    <header class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Mis Documentos</h1>
            <p class="text-slate-500 mt-2 font-medium">Presupuestos e imágenes generadas</p>
        </div>
        <a href="{{ url_for('dashboard') }}" class="text-indigo-600 hover:text-indigo-800 text-sm font-bold">
            ← Volver
        </a>
    </header>

    <!-- TABS NAVIGATION -->
    <div class="mb-6 border-b border-slate-200 overflow-x-auto no-scrollbar">
        <div class="flex gap-6 -mb-px min-w-max px-2">
            <button @click="tab = 'proposals'"
                :class="{ 'border-indigo-600 text-indigo-600': tab === 'proposals', 'border-transparent text-slate-500 hover:text-slate-700': tab !== 'proposals' }"
                class="pb-4 font-bold text-sm border-b-2 transition-colors flex items-center gap-2 whitespace-nowrap">
                📄 Presupuestos <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full text-xs">{{
                    proposals|length }}</span>
            </button>
            <button @click="tab = 'images'"
                :class="{ 'border-purple-600 text-purple-600': tab === 'images', 'border-transparent text-slate-500 hover:text-slate-700': tab !== 'images' }"
                class="pb-4 font-bold text-sm border-b-2 transition-colors flex items-center gap-2 whitespace-nowrap">
                🖼️ Imágenes <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full text-xs">{{ images|length
                    }}</span>
            </button>
            <button @click="tab = 'presentations'"
                :class="{ 'border-orange-500 text-orange-500': tab === 'presentations', 'border-transparent text-slate-500 hover:text-slate-700': tab !== 'presentations' }"
                class="pb-4 font-bold text-sm border-b-2 transition-colors flex items-center gap-2 whitespace-nowrap">
                📊 Presentaciones <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full text-xs">{{
                    presentations|length }}</span>
            </button>
            <button @click="tab = 'videos'"
                :class="{ 'border-pink-500 text-pink-500': tab === 'videos', 'border-transparent text-slate-500 hover:text-slate-700': tab !== 'videos' }"
                class="pb-4 font-bold text-sm border-b-2 transition-colors flex items-center gap-2 whitespace-nowrap">
                🎬 Video Prompts <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded-full text-xs">{{
                    videos|length }}</span>
            </button>
        </div>
    </div>

    <!-- ... Content Sections ... -->

    <!-- FAB Floating Action Button for Video -->
    <!-- Lifted to bottom-24 to clear Mobile Nav -->
    <div class="fixed bottom-24 right-6 z-50 md:bottom-12" x-show="tab === 'videos'" style="display: none;">
        <button onclick="document.getElementById('videoUploadInput').click()"
            class="bg-pink-600 hover:bg-pink-700 text-white p-4 rounded-full shadow-lg transition-transform transform active:scale-95 flex items-center gap-2 animate-bounce-in">
            ✨ <span class="hidden md:inline font-bold">Crear Nuevo Vídeo</span>
            <span class="md:hidden font-bold">Crear</span>
        </button>
        <input type="file" id="videoUploadInput" class="hidden" accept="image/*" onchange="uploadImageForVideo(this)">
    </div>

    <!-- Script for Video Upload & Deletion -->
    <script>
        async function uploadImageForVideo(input) {
            if (input.files && input.files[0]) {
                const formData = new FormData();
                formData.append('image', input.files[0]);

                // Feedback visual inmediato
                const btn = document.querySelector('button[onclick*="videoUploadInput"]');
                const originalHtml = btn.innerHTML;
                btn.innerHTML = "⏳ Analizando & Renderizando (1-2 min)...";
                btn.classList.add('opacity-75', 'cursor-wait');
                btn.disabled = true;

                try {
                    const response = await fetch('/generate_video_from_image', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();

                    if (data.success) {
                        // Success Feedback
                        btn.innerHTML = "✅ ¡Vídeo Listo!";
                        btn.classList.remove('bg-pink-600');
                        btn.classList.add('bg-green-600');

                        setTimeout(() => {
                            location.reload(); // Recargar para ver el nuevo video
                        }, 2000);
                    } else {
                        alert("❌ Error: " + data.error);
                        btn.innerHTML = originalHtml;
                        btn.disabled = false;
                        btn.classList.remove('opacity-75', 'cursor-wait');
                    }
                } catch (e) {
                    alert("Error de conexión");
                    console.error(e);
                    btn.innerHTML = originalHtml;
                    btn.disabled = false;
                }
            }
        }

        async function deleteDocument(docId, btnElement) {
            if (!confirm("¿Estás seguro de que quieres eliminar este archivo? Esta acción no se puede deshacer.")) {
                return;
            }

            // Animación inmediata de "borrado" (optimista)
            const card = btnElement.closest('.bg-white');
            if (card) {
                card.style.transition = "all 0.3s ease";
                card.style.opacity = "0.5";
                card.style.pointerEvents = "none";
            }

            try {
                const response = await fetch(`/delete_document/${docId}`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    if (card) {
                        card.style.opacity = "0";
                        card.style.transform = "scale(0.9)";
                        setTimeout(() => {
                            card.remove();
                        }, 300);
                    } else {
                        location.reload();
                    }
                } else {
                    alert("❌ Error eliminando: " + data.error);
                    if (card) {
                        card.style.opacity = "1";
                        card.style.pointerEvents = "all";
                    }
                }
            } catch (e) {
                console.error(e);
                alert("Error de conexión al eliminar.");
                if (card) {
                    card.style.opacity = "1";
                    card.style.pointerEvents = "all";
                }
            }
        }
    </script>

    <!-- Alpine.js for Tabs (Simple injection if not present in base) -->
    <script src="//unpkg.com/alpinejs" defer></script>

</div>
{% endblock %}
