<div
    class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between transition-all hover:shadow-md">
    <div class="flex items-start gap-4">
        <div class="w-12 h-12 bg-indigo-50 rounded-xl flex items-center justify-center text-2xl shrink-0">
            {{ icon }}
        </div>
        <div>
            <h3 class="font-bold text-slate-800 text-lg">{{ title }}</h3>
            <p class="text-slate-500 text-sm leading-relaxed mt-1">{{ desc }}</p>

            {% if guide %}
            <div
                class="mt-3 bg-indigo-50 text-indigo-700 px-3 py-2 rounded-lg text-xs font-medium flex gap-2 items-start">
                <span class="text-indigo-500 text-sm">💡</span>
                <span>{{ guide }}</span>
            </div>
            {% endif %}
        </div>
    </div>

    <form action="{{ url_for('web.toggle_agent', agent_id=id) }}" method="POST" class="ml-4 shrink-0">
        {% if active %}
        <div class="flex items-center gap-2">
            <!-- Botón Configurar -->
            <a href="{{ url_for('web.agent_config', agent_id=id) }}"
                class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200 hover:text-indigo-600 transition-colors"
                title="Configurar Agente">
                ⚙️
            </a>

            <!-- Toggle Desactivar -->
            <button type="submit"
                class="w-14 h-8 rounded-full bg-indigo-600 relative transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                <span class="sr-only">Desactivar</span>
                <span aria-hidden="true"
                    class="translate-x-7 inline-block w-6 h-6 rounded-full bg-white shadow transform ring-0 transition ease-in-out duration-200 pointer-events-none absolute top-1 left-1"></span>
            </button>
        </div>
        {% else %}
        <button type="submit"
            class="w-14 h-8 rounded-full bg-slate-200 relative transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
            <span class="sr-only">Activar</span>
            <span aria-hidden="true"
                class="translate-x-1 inline-block w-6 h-6 rounded-full bg-white shadow transform ring-0 transition ease-in-out duration-200 pointer-events-none absolute top-1 left-1"></span>
        </button>
        {% endif %}
    </form>
</div>
