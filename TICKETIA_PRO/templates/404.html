{% extends "base.html" %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-full px-6 py-24 text-center">
    <div class="text-8xl mb-6 select-none">404</div>
    <h1 class="text-2xl font-bold text-slate-800 mb-2">Página no encontrada</h1>
    <p class="text-slate-400 mb-8 max-w-xs">Esta página no existe o fue movida. Vuelve al inicio y sigue desde allí.</p>
    <a href="{{ url_for('web.dashboard') if session.get('user_phone') else url_for('web.index') }}"
        class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold px-6 py-3 rounded-2xl shadow-lg shadow-indigo-200 transition-all active:scale-95">
        Volver al inicio
    </a>
</div>
{% endblock %}
