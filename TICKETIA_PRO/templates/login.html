{% extends "base.html" %}
{% block title %}Iniciar Sesión — Zeptai{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-full px-6 py-12 bg-slate-50">
    <div class="w-full max-w-sm bg-white rounded-3xl shadow-xl p-8 border border-slate-100">

        <div class="text-center mb-10">
            <div class="text-5xl mb-4">👋</div>
            <h1 class="text-2xl font-bold text-slate-800">Bienvenido de nuevo</h1>
            <p class="text-slate-400 mt-2 text-sm">Gestiona tus gastos con IA</p>
        </div>

        <form action="{{ url_for('web.login') }}" method="POST" class="space-y-6" id="loginForm" novalidate>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Email</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-400">📧</span>
                    <input type="email" name="email" id="loginEmail" placeholder="tu@email.com" required autocomplete="email"
                        class="w-full pl-11 pr-10 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-slate-800 font-medium"
                        oninput="validateField(this, /^[^\s@]+@[^\s@]+\.[^\s@]+$/, 'Email no valido')">
                    <span id="loginEmail-ok" class="absolute right-4 top-3.5 text-emerald-500 hidden">✓</span>
                </div>
                <p id="loginEmail-err" class="text-xs text-red-500 mt-1 ml-1 hidden"></p>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2 ml-1">Contraseña</label>
                <div class="relative">
                    <span class="absolute left-4 top-3.5 text-slate-400">🔒</span>
                    <input type="password" name="password" id="loginPwd" placeholder="••••••••" required autocomplete="current-password"
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:bg-white focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-slate-800 font-medium"
                        oninput="validateField(this, /^.{6,}$/, 'Minimo 6 caracteres')">
                </div>
                <p id="loginPwd-err" class="text-xs text-red-500 mt-1 ml-1 hidden"></p>
                <div class="text-right mt-2">
                    <a href="{{ url_for('web.forgot_password') }}"
                        class="text-xs text-indigo-500 hover:text-indigo-700 font-medium">¿Olvidaste tu contraseña?</a>
                </div>
            </div>

            <button type="submit" id="loginSubmit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all transform active:scale-95 text-sm uppercase tracking-wide">
                Ingresar
            </button>

        </form>

        <script>
            function validateField(input, regex, errMsg) {
                const errEl = document.getElementById(input.id + '-err');
                const okEl  = document.getElementById(input.id + '-ok');
                const valid = regex.test(input.value.trim());
                if (input.value.trim() === '') {
                    input.classList.remove('border-red-300', 'border-emerald-300');
                    if (errEl) errEl.classList.add('hidden');
                    if (okEl)  okEl.classList.add('hidden');
                } else if (valid) {
                    input.classList.add('border-emerald-300');
                    input.classList.remove('border-red-300');
                    if (errEl) errEl.classList.add('hidden');
                    if (okEl)  okEl.classList.remove('hidden');
                } else {
                    input.classList.add('border-red-300');
                    input.classList.remove('border-emerald-300');
                    if (errEl) { errEl.textContent = errMsg; errEl.classList.remove('hidden'); }
                    if (okEl)  okEl.classList.add('hidden');
                }
            }
        </script>

        <div class="mt-8 text-center">
            <p class="text-xs text-slate-400 font-medium">
                ¿Aún no tienes cuenta?
                <a href="{{ url_for('web.register') }}"
                    class="text-indigo-600 hover:text-indigo-700 font-bold ml-1 transition-colors">Regístrate gratis</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
