version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ticketia_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ticketia_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketia_app
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:password@db:5432/ticketia_db
    volumes:
      - ./TICKETIA_PRO:/app/TICKETIA_PRO
      - ./.env:/app/.env
    restart: unless-stopped
    depends_on:
      - db

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ticketia_scheduler
    command: python run_scheduler.py
    environment:
      - FLASK_ENV=development
      - DATABASE_URL=postgresql://postgres:password@db:5432/ticketia_db
    volumes:
      - ./TICKETIA_PRO:/app/TICKETIA_PRO
      - ./.env:/app/.env
    restart: unless-stopped
    depends_on:
      - web
      - db

volumes:
  pgdata:
